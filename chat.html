<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Heart Chat Room</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020a02;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header{
background:#000;
padding:15px;
text-align:center;
border-bottom:2px solid #00ff66;
}

header h1{
color:#00ff66;
font-size:1.6rem;
text-shadow:0 0 10px #00ff66;
}

header a{
display:inline-block;
margin-top:10px;
color:#fff;
text-decoration:none;
padding:8px 15px;
border:1px solid #00ff66;
border-radius:20px;
}

/* CHAT WRAPPER (IFRAME AREA) */
#chatFrameWrap{
flex:1;
padding:10px;
}

iframe{
width:100%;
height:100%;
border:none;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,102,0.2);
}

/* INPUT AREA */
#inputArea{
display:flex;
padding:10px;
background:#000;
border-top:2px solid #00ff66;
}

#messageInput{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:20px;
font-size:1rem;
}

button{
margin-left:10px;
padding:12px 18px;
background:#00ff66;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00cc55;
}

/* MOBILE */
@media(max-width:600px){
header h1{
font-size:1.2rem;
}
}
</style>
</head>

<body>

<header>
<h1>💚 Green Heart Chat Room 💚</h1>
<a href="greenheartfamly.html">⬅ Back Home</a>
</header>

<iframe src="https://deadsimplechat.com/dtmj6g2wJ" width="400px" height="600px"></iframe>
</div>


</body>
</html>
